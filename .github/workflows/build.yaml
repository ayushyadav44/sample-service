name: Build and Push to ECR

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      env:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: string
      buildEnv:
        description: "Build environment"
        required: true
        default: "staging"
        type: string
      service:
        description: "Service name"
        required: true
        default: "sample-service"
        type: string
      dfName:
        description: "Dockerfile to use for build"
        required: true
        default: "Dockerfile"
        type: string

env:
  AWS_REGION: ap-south-1
  AWS_DEFAULT_REGION: ap-south-1

jobs:
  build:
    runs-on: arc-runner-set
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          COMMIT_ID=$(git rev-parse --short HEAD)
          TAG="${COMMIT_ID}-${{ github.run_number }}"

          # Use input if manually triggered, fall back to secret
          ENV="${{ github.event.inputs.environment || vars.ENV }}"
          SERVICE="${{ github.event.inputs.service || vars.SERVICE }}"

          IMAGE="${{ vars.ECR_REPO }}/${ENV}/${SERVICE}:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "env=${ENV}" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ github.event.inputs.dockerfile_name || vars.DOCKERFILE_NAME || 'Dockerfile' }}
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: ${{ steps.tag.outputs.image }}
          build-args: |
            ENV=${{ github.event.inputs.env || vars.ENV }}
            ecrRepo=${{ vars.ECR_REPO }}
            MAX_INCOMPLETE_EVENT_SIZE=51200

      - name: Summary
        run: |
          echo "### Build complete" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.tag.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
